{% extends "admin/base_admin.html" %}
{% block title %}Nuevo Ingrediente - Admin{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>Nuevo Ingrediente</h1><div class="breadcrumb-custom"><a href="{{ url_for('admin.ingredientes') }}">Ingredientes</a> / Crear</div></div>
</div>
<div class="form-card" style="max-width:560px">
  <form method="POST" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-12"><label class="form-label">Nombre *</label><input type="text" name="nombre" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Categoria</label><input type="text" name="categoria" class="form-control" placeholder="Carnes, Vegetales"></div>
      <div class="col-md-3"><label class="form-label">Precio Extra</label><input type="number" name="precio_extra" class="form-control" step="0.01" value="0.00"></div>
      <div class="col-md-3"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" value="100"></div>
      <div class="col-12"><label class="form-label">Imagen de pieza</label><input type="file" name="imagen" class="form-control" accept=".png,.jpg,.jpeg,.webp"></div>
      <input type="hidden" name="icono" value="">
      <div class="col-12 d-flex gap-2 pt-2">
        <button type="submit" class="btn-primary-custom"><i class="bi bi-check-lg"></i> Guardar</button>
        <a href="{{ url_for('admin.ingredientes') }}" class="btn-outline-custom" style="color:var(--basil);border-color:var(--basil)">Cancelar</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
