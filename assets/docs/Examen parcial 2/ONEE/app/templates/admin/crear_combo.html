{% extends "admin/base_admin.html" %}
{% block content %}
<div class="page-header"><div><h1>Nuevo Combo</h1><div class="breadcrumb-custom"><a href="{{ url_for('admin.combos') }}">Combos</a> / Crear</div></div></div>
<div class="form-card" style="max-width:560px">
  <form method="POST" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-12"><label class="form-label">Nombre *</label><input type="text" name="nombre" class="form-control" required></div>
      <div class="col-12"><label class="form-label">Descripcion</label><textarea name="descripcion" class="form-control" rows="2"></textarea></div>
      <div class="col-md-6"><label class="form-label">Precio *</label><input type="number" name="precio" class="form-control" step="0.01" required></div>
      <div class="col-md-6"><label class="form-label">Imagen</label><input type="file" name="imagen" class="form-control" accept=".png,.jpg,.jpeg,.webp"></div>
      <div class="col-12 d-flex gap-2"><button type="submit" class="btn-primary-custom"><i class="bi bi-check-lg"></i> Guardar</button><a href="{{ url_for('admin.combos') }}" class="btn-outline-custom" style="color:var(--basil);border-color:var(--basil)">Cancelar</a></div>
    </div>
  </form>
</div>
{% endblock %}
