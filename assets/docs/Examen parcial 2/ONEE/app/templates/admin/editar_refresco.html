{% extends "admin/base_admin.html" %}
{% block content %}
<div class="page-header"><div><h1>Editar Refresco</h1><div class="breadcrumb-custom"><a href="{{ url_for('admin.refrescos') }}">Refrescos</a> / Editar</div></div></div>
<div class="form-card" style="max-width:520px">
  <form method="POST" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-12"><label class="form-label">Nombre *</label><input type="text" name="nombre" class="form-control" value="{{ refresco.nombre }}" required></div>
      <div class="col-md-6"><label class="form-label">Tamano</label><input type="text" name="tamano" class="form-control" value="{{ refresco.tamano or '' }}"></div>
      <div class="col-md-3"><label class="form-label">Precio *</label><input type="number" name="precio" class="form-control" step="0.01" value="{{ refresco.precio }}" required></div>
      <div class="col-md-3"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" value="{{ refresco.stock }}"></div>
      <div class="col-md-6"><label class="form-label">Estado</label><select name="estado" class="form-select"><option value="activo" {{ 'selected' if refresco.estado=='activo' }}>Activo</option><option value="inactivo" {{ 'selected' if refresco.estado=='inactivo' }}>Inactivo</option></select></div>
      <div class="col-md-6"><label class="form-label">Imagen</label><input type="file" name="imagen" class="form-control" accept=".png,.jpg,.jpeg,.webp"></div>
      <div class="col-12 d-flex gap-2"><button type="submit" class="btn-primary-custom"><i class="bi bi-check-lg"></i> Guardar</button><a href="{{ url_for('admin.refrescos') }}" class="btn-outline-custom" style="color:var(--basil);border-color:var(--basil)">Cancelar</a></div>
    </div>
  </form>
</div>
{% endblock %}
