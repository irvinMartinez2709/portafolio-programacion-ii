{% extends "admin/base_admin.html" %}
{% block content %}
<div class="page-header"><div><h1>📍 Nueva Zona</h1><div class="breadcrumb-custom"><a href="{{ url_for('admin.zonas') }}">Zonas</a> › Crear</div></div></div>
<div class="form-card" style="max-width:500px">
  <form method="POST">
    <div class="row g-3">
      <div class="col-12"><label class="form-label">Corregimiento *</label><select name="id_corregimiento" class="form-select" required>{% for c in corregimientos %}<option value="{{ c.id }}">{{ c.nombre }} ({{ c.distrito.nombre }})</option>{% endfor %}</select></div>
      <div class="col-12"><label class="form-label">Nombre de Zona *</label><input type="text" name="nombre_zona" class="form-control" required></div>
      <div class="col-12"><label class="form-label">Descripción</label><input type="text" name="descripcion" class="form-control"></div>
      <div class="col-md-6"><label class="form-label">Costo Delivery ($) *</label><input type="number" name="costo_delivery" class="form-control" step="0.25" required></div>
      <div class="col-md-6"><label class="form-label">Tiempo Est. (min)</label><input type="number" name="tiempo_estimado_min" class="form-control" value="30"></div>
      <div class="col-12 d-flex gap-2"><button type="submit" class="btn-primary-custom"><i class="bi bi-check-lg"></i> Guardar</button><a href="{{ url_for('admin.zonas') }}" class="btn-outline-custom" style="color:var(--basil);border-color:var(--basil)">Cancelar</a></div>
    </div>
  </form>
</div>
{% endblock %}
